version: "3.8"

services:
  node1:
    build: .
    container_name: node1
    environment:
      - NODE_NAME=node1
    networks:
      - ipfs-net
    ports:
      - "5020:5001"
    restart: unless-stopped

  node2:
    build: .
    container_name: node2
    environment:
      - NODE_NAME=node2
    networks:
      - ipfs-net
    ports:
      - "5021:5001"
    restart: unless-stopped
    depends_on:
      - node1

  node3:
    build: .
    container_name: node3
    environment:
      - NODE_NAME=node3
    networks:
      - ipfs-net
    ports:
      - "5023:5001"
    restart: unless-stopped
    depends_on:
      - node1

  node4:
    build: .
    container_name: node4
    environment:
      - NODE_NAME=node4
    networks:
      - ipfs-net
    ports:
      - "5024:5001"
    restart: unless-stopped
    depends_on:
      - node1

networks:
  ipfs-net:
    driver: bridge
